services:
  rabbitmq:
    image: rabbitmq:3-management
    # No host port mapping — avoid conflicts with host RabbitMQ
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: [ "CMD", "rabbitmqctl", "status" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: data_processing
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: datasets
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      CORS_ORIGINS: "http://localhost:5173"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker-1:
    build: ./backend
    command: celery -A workers.celery_app worker --loglevel=info
      --hostname=worker-1@%h --concurrency=2
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: data_processing
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: datasets
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      SIMULATE_DELAY_SECONDS: "5"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker-2:
    build: ./backend
    command: celery -A workers.celery_app worker --loglevel=info
      --hostname=worker-2@%h --concurrency=2
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      MONGO_URL: mongodb://mongodb:27017
      MONGO_DB: data_processing
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: datasets
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      SIMULATE_DELAY_SECONDS: "5"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  mongo_data:
  minio_data:
